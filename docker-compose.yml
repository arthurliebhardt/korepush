services:
  postgres:
    image: postgres:16-alpine
    container_name: kubepush-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kubepush
      POSTGRES_PASSWORD: kubepush
      POSTGRES_DB: kubepush
    ports:
      - "5432:5432"
    volumes:
      - kubepush_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubepush"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kubepush_pgdata:
