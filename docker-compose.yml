services:
  postgres:
    image: postgres:16-alpine
    container_name: korepush-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: korepush
      POSTGRES_PASSWORD: korepush
      POSTGRES_DB: korepush
    ports:
      - "5432:5432"
    volumes:
      - korepush_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korepush"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  korepush_pgdata:
