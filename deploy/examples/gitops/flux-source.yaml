# Point Flux at your manifests repo. Apply on the server:
#   kubectl apply -f flux-source.yaml
# Edit the url + branch to your repo.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: korepush-apps
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/your-org/korepush-apps # ← your manifests repo
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: korepush-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./ # directory in the repo holding the manifests
  prune: true # delete resources removed from git
  sourceRef:
    kind: GitRepository
    name: korepush-apps
