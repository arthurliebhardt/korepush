# korepush.yaml — the friendly format. Put ONE of these at the root of your
# GitOps repo instead of hand-writing KoreApp/KoreSpace/KoreDatabase CRs.
# korepush expands it into those CRs (spaces are auto-created, env maps become
# lists, etc.) and keeps them in sync with this file.
defaultSpace: shop # apps/databases inherit this if they omit `space`

databases:
  - name: web-db # → a Postgres (KoreDatabase) in space `shop`

apps:
  - name: web
    image: nginx:alpine # an image app
    port: 80
    replicas: 2
    env:
      NODE_ENV: production
    domains:
      - shop.example.com
    database:
      name: web-db # attach the database above (injects DATABASE_URL)

  - name: api
    space: shop
    git: # a git app — built from source
      repoUrl: https://github.com/your-org/api
      ref: main
    port: 3000
