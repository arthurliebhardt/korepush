# The KoreDatabase CRD — a per-space managed database. The operator reconciles
# it by engine: postgres -> a CloudNativePG Cluster (db-<name>); redis -> an
# operator-managed Deployment + Service + PVC + generated-password Secret. EVERY
# engine exposes a `db-<name>-app` Secret (key `uri`) a KoreApp references via
# spec.database — so the app-attach path is engine-agnostic. Namespaced;
# metadata.name = the database slug. (mysql is a planned follow-up: widen the
# enum + add a reconcileMysql branch.)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: koredatabases.korepush.io
spec:
  group: korepush.io
  scope: Namespaced
  names:
    kind: KoreDatabase
    plural: koredatabases
    singular: koredatabase
    shortNames: [kdb]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Engine, type: string, jsonPath: .spec.engine }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Ready, type: integer, jsonPath: .status.readyInstances }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                # postgres -> CNPG Cluster; redis -> operator Deployment+Service+PVC+Secret.
                engine: { type: string, enum: [postgres, redis], default: postgres }
                # version applies to postgres only (CNPG operand major). redis bakes
                # redis:7-alpine and ignores this field.
                version: { type: integer, default: 16 }
                # postgres: CNPG volume size. redis: the data PVC size.
                storage: { type: string, default: "5Gi" }
                # instances applies to postgres (CNPG nodes) only; redis is single-replica.
                instances: { type: integer, minimum: 1, maximum: 3, default: 1 }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase: { type: string }
                connectionSecret: { type: string }
                readyInstances: { type: integer }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer }
                      lastTransitionTime: { type: string }
                      reason: { type: string }
                      message: { type: string }
