# The KoreDatabase CRD — a per-space Postgres database. The operator reconciles
# it into a CloudNativePG Cluster (db-<name>) in the space namespace; CNPG then
# creates the `db-<name>-app` Secret (key `uri`) a KoreApp references via
# spec.database. Namespaced; metadata.name = the database slug. The Cluster
# carries an ownerReference so deleting the KoreDatabase GCs it.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: koredatabases.korepush.io
spec:
  group: korepush.io
  scope: Namespaced
  names:
    kind: KoreDatabase
    plural: koredatabases
    singular: koredatabase
    shortNames: [kdb]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Engine, type: string, jsonPath: .spec.engine }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Ready, type: integer, jsonPath: .status.readyInstances }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                engine: { type: string, enum: [postgres], default: postgres }
                version: { type: integer, default: 16 }
                storage: { type: string, default: "5Gi" }
                instances: { type: integer, minimum: 1, maximum: 3, default: 1 }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase: { type: string }
                connectionSecret: { type: string }
                readyInstances: { type: integer }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer }
                      lastTransitionTime: { type: string }
                      reason: { type: string }
                      message: { type: string }
