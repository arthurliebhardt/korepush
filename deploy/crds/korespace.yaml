# The KoreSpace CRD — a tenant space. The operator reconciles it into a
# Namespace (ks-<name>) + a ResourceQuota + a LimitRange. Cluster-scoped because
# it owns a Namespace; deleting a KoreSpace garbage-collects the Namespace (and
# everything in it — KoreApps run their finalizers as the namespace terminates).
# metadata.name = the space slug.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: korespaces.korepush.io
spec:
  group: korepush.io
  scope: Cluster
  names:
    kind: KoreSpace
    plural: korespaces
    singular: korespace
    shortNames: [ksp]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - { name: Namespace, type: string, jsonPath: .status.namespace }
        - { name: Phase, type: string, jsonPath: .status.phase }
        - { name: Age, type: date, jsonPath: .metadata.creationTimestamp }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                displayName: { type: string }
                # Optional ResourceQuota overrides; the operator applies sensible
                # defaults for any field left unset.
                quota:
                  type: object
                  properties:
                    requestsCpu: { type: string }
                    requestsMemory: { type: string }
                    limitsCpu: { type: string }
                    limitsMemory: { type: string }
                    pods: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase: { type: string, enum: [Pending, Provisioning, Running, Failed] }
                namespace: { type: string }
                observedGeneration: { type: integer }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer }
                      lastTransitionTime: { type: string }
                      reason: { type: string }
                      message: { type: string }
