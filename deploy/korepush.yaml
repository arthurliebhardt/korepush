# korepush control-plane manifests.
# Placeholders (__UPPER__) are substituted by install.sh before `kubectl apply`.
apiVersion: v1
kind: Namespace
metadata:
  name: korepush-system
  labels:
    app.kubernetes.io/managed-by: korepush
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: korepush
  namespace: korepush-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: korepush
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - resourcequotas
      - services
      - pods
      - pods/log
      - secrets
      - configmaps
      - persistentvolumeclaims
      - limitranges
      - events
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read the node's address to show DNS instructions for custom domains.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # KoreApp CRs: the UI authors these (create on app create, patch on
  # deploy/env/db/domain/rollback, delete on app delete); the operator owns
  # status + the reconcile. Status is operator-owned, so no koreapps/status here.
  - apiGroups: ["korepush.io"]
    resources: ["koreapps", "korespaces", "koredatabases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # GitOps: read Flux sources + kustomizations to render each app's sync status
  # in the dashboard (Flux applies the CRs; korepush only reads its state).
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CloudNativePG databases (provisioned per space)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # cert-manager: backfill the ACME email on a ClusterIssuer (control-plane
  # domain) + directly manage per-app-domain Certificates (custom domains).
  - apiGroups: ["cert-manager.io"]
    resources: ["clusterissuers", "certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Gateway API: the control plane manages the shared Gateway's listeners and
  # per-app HTTPRoutes (routing + canary traffic-splitting).
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: korepush
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: korepush
subjects:
  - kind: ServiceAccount
    name: korepush
    namespace: korepush-system
---
# ---- Platform database ----
apiVersion: v1
kind: Secret
metadata:
  name: korepush-db
  namespace: korepush-system
type: Opaque
stringData:
  POSTGRES_USER: korepush
  POSTGRES_PASSWORD: __DB_PASSWORD__
  POSTGRES_DB: korepush
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: korepush-pgdata
  namespace: korepush-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: korepush-system
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  strategy:
    type: Recreate
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: korepush-db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "korepush"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: korepush-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: korepush-system
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
---
# ---- Control plane ----
apiVersion: v1
kind: Secret
metadata:
  name: korepush-app
  namespace: korepush-system
type: Opaque
stringData:
  DATABASE_URL: postgres://korepush:__DB_PASSWORD__@postgres.korepush-system.svc:5432/korepush
  BETTER_AUTH_SECRET: __AUTH_SECRET__
  # How the control-plane UI is reached (http://<ip> initially; a domain later).
  BETTER_AUTH_URL: __AUTH_URL__
  # Extra origins better-auth should trust (comma-separated); grows when a
  # custom domain is added via Settings so neither URL gets locked out.
  KOREPUSH_TRUSTED_ORIGINS: __TRUSTED_ORIGINS__
  # Base domain used to build per-app hostnames (<app>.<space>.<base>).
  KOREPUSH_BASE_DOMAIN: __APP_BASE_DOMAIN__
  # ACME contact email (Let's Encrypt). May be empty; the admin's email
  # backfills the ClusterIssuer when a custom domain is added via Settings.
  KOREPUSH_ACME_EMAIL: __ACME_EMAIL__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: korepush
  namespace: korepush-system
  labels: { app: korepush }
spec:
  replicas: 1
  selector:
    matchLabels: { app: korepush }
  template:
    metadata:
      labels: { app: korepush }
    spec:
      serviceAccountName: korepush
      containers:
        - name: korepush
          image: __KOREPUSH_IMAGE__
          envFrom:
            - secretRef:
                name: korepush-app
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: korepush
  namespace: korepush-system
spec:
  selector: { app: korepush }
  ports:
    - port: 80
      targetPort: 3000
---
# Host-less (catch-all) HTTPRoute on the shared Gateway's HTTP listener, so the
# control plane is reachable at the raw VPS IP. A custom-domain HTTPRoute
# (korepush-cp) is ADDED later via Settings; the catch-all stays so the IP keeps
# working and you can't get locked out.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: korepush-catchall
  namespace: korepush-system
  labels:
    app.kubernetes.io/managed-by: korepush
spec:
  parentRefs:
    - name: korepush
      namespace: kube-system
      sectionName: web
  rules:
    - backendRefs:
        - name: korepush
          port: 80
---
# ---- In-cluster image registry (build target) ----
# Builds push here by the svc-DNS name; containerd pulls the SAME name via a
# registries.yaml mirror -> http://127.0.0.1:30000 (NodePort), written by install.sh.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: korepush-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: korepush-system
  labels: { app: registry }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - { containerPort: 5000, name: http }
          env:
            - { name: REGISTRY_HTTP_ADDR, value: ":5000" }
            - { name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY, value: "/var/lib/registry" }
            - { name: REGISTRY_STORAGE_DELETE_ENABLED, value: "true" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/registry }
          readinessProbe:
            httpGet: { path: /v2/, port: 5000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
# ClusterIP: PUSH target for build Jobs (resolved via CoreDNS in-cluster).
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: korepush-system
  labels: { app: registry }
spec:
  type: ClusterIP
  selector: { app: registry }
  ports:
    - { name: http, port: 5000, targetPort: 5000 }
---
# NodePort: PULL bridge so the host's containerd reaches the registry at 127.0.0.1:30000.
apiVersion: v1
kind: Service
metadata:
  name: registry-nodeport
  namespace: korepush-system
  labels: { app: registry }
spec:
  type: NodePort
  selector: { app: registry }
  ports:
    - { name: http, port: 5000, targetPort: 5000, nodePort: 30000 }
