# korepush monitoring stack — Prometheus + kube-state-metrics + node-exporter
# + Grafana. Bundled by install.sh (single `kubectl apply -f`), mirroring the
# CloudNativePG install pattern. Placeholders (__UPPER__) are substituted by
# install.sh before apply. The control plane reaches Prometheus over service
# DNS (no extra RBAC on the korepush SA — exactly like postgres/registry).
apiVersion: v1
kind: Namespace
metadata:
  name: korepush-monitoring
  labels:
    app.kubernetes.io/managed-by: korepush
---
# ---- Prometheus ----
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: korepush-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: korepush-prometheus
rules:
  # nodes/metrics is load-bearing: without it, scraping the kubelet's
  # /metrics/cadvisor via the apiserver proxy returns 403.
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - nodes/stats
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: korepush-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: korepush-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: korepush-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: korepush-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
    scrape_configs:
      # Container metrics from the kubelet's built-in cAdvisor, via the
      # apiserver proxy (works on k3s where direct kubelet TLS is fiddly).
      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
      # Kubelet node metrics (same proxy path, /metrics).
      - job_name: kubernetes-kubelet
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.korepush-monitoring.svc.cluster.local:8080"]
      - job_name: node-exporter
        static_configs:
          - targets: ["node-exporter.korepush-monitoring.svc.cluster.local:9100"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: korepush-monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: korepush-monitoring
  labels: { app: prometheus }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.12.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.retention.size=4GB
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: korepush-monitoring
  labels: { app: prometheus }
spec:
  selector: { app: prometheus }
  ports:
    - { name: http, port: 9090, targetPort: 9090 }
---
# ---- kube-state-metrics (only `pods` collected — that covers restarts,
#      resource limits, and pod info, which are all korepush needs) ----
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: korepush-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: korepush-kube-state-metrics
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: korepush-kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: korepush-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: korepush-monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: korepush-monitoring
  labels: { app: kube-state-metrics }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kube-state-metrics }
  template:
    metadata:
      labels: { app: kube-state-metrics }
    spec:
      serviceAccountName: kube-state-metrics
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.19.0
          args:
            - --resources=pods
            - --port=8080
            - --telemetry-port=8081
          ports:
            - { containerPort: 8080, name: http-metrics }
            - { containerPort: 8081, name: telemetry }
          readinessProbe:
            httpGet: { path: /readyz, port: 8081 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: korepush-monitoring
  labels: { app: kube-state-metrics }
spec:
  selector: { app: kube-state-metrics }
  ports:
    - { name: http-metrics, port: 8080, targetPort: 8080 }
---
# ---- node-exporter (host CPU/mem/disk/net) ----
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: korepush-monitoring
  labels: { app: node-exporter }
spec:
  selector:
    matchLabels: { app: node-exporter }
  template:
    metadata:
      labels: { app: node-exporter }
    spec:
      hostNetwork: true
      hostPID: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      tolerations:
        - operator: Exists
      containers:
        - name: node-exporter
          image: quay.io/prometheus/node-exporter:v1.11.1
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
          ports:
            - { containerPort: 9100, name: metrics, hostPort: 9100 }
          volumeMounts:
            - { name: proc, mountPath: /host/proc, readOnly: true }
            - { name: sys, mountPath: /host/sys, readOnly: true }
            - { name: root, mountPath: /host/root, readOnly: true, mountPropagation: HostToContainer }
          resources:
            requests: { cpu: "10m", memory: "24Mi" }
            limits: { cpu: "200m", memory: "64Mi" }
      volumes:
        - { name: proc, hostPath: { path: /proc } }
        - { name: sys, hostPath: { path: /sys } }
        - { name: root, hostPath: { path: / } }
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: korepush-monitoring
  labels: { app: node-exporter }
spec:
  selector: { app: node-exporter }
  ports:
    - { name: metrics, port: 9100, targetPort: 9100 }
---
# ---- Grafana (authenticated power-user view; native charts are the primary
#      surface in the korepush UI). Served under /grafana on the same origin. ----
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: korepush-monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: __GRAFANA_PASSWORD__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: korepush-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.korepush-monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: korepush-monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: korepush
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
