apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: korepush-monitoring
  labels: { app: grafana }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "false" }
            - { name: GF_USERS_ALLOW_SIGN_UP, value: "false" }
            - { name: GF_SERVER_ROOT_URL, value: "__AUTH_URL__/grafana" }
            - { name: GF_SERVER_SERVE_FROM_SUB_PATH, value: "true" }
            - { name: GF_ANALYTICS_REPORTING_ENABLED, value: "false" }
            - { name: GF_ANALYTICS_CHECK_FOR_UPDATES, value: "false" }
            - { name: GF_NEWS_NEWS_FEED_ENABLED, value: "false" }
          ports:
            - containerPort: 3000
          volumeMounts:
            - { name: storage, mountPath: /var/lib/grafana }
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: storage
          emptyDir: {}
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboards
          configMap: { name: grafana-dashboards }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: korepush-monitoring
  labels: { app: grafana }
spec:
  selector: { app: grafana }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
# Grafana under /grafana on the shared Gateway (web HTTP listener; on a custom
# domain it's served over the panel cert via SNI on the https listener too).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: korepush-monitoring
  labels:
    app.kubernetes.io/managed-by: korepush
spec:
  parentRefs:
    - name: korepush
      namespace: kube-system
      sectionName: web
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: grafana
          port: 3000
